<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTELLI</title>

    <link rel="shortcut icon" href="assets/img/iNTELLI AI.png" type="image/x-icon">

    <!-- Bootsrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- Bootsrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Particle js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js"
        type="text/javascript"></script>

    <!-- Texllate  -->
    <link rel="stylesheet" href="assets/vendore/texllate/animate.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">



        <section id="Oval" class="mb-4">

            <div class="row">
                <div class="col-md-1"></div>
                <div class="col-md-10">
                    <div class="d-flex justify-content-center align-items-center" style="height: 80vh;">

                        <canvas id="canvasOne" width="700" height="420" style="position: absolute;"></canvas>

                        <div id="INTELLIHood">

                            <div class="square">
                                <span class="circle"></span>
                                <span class="circle"></span>
                                <span class="circle"></span>
                            </div>

                        </div>

                    </div>
                    <h5 class="text-light text text-center">Ask me anything</h5>

                    <div class="col-md-12 mt-4 pt-4">
                        <div class="text-center">
                            <div id="TextInput" class="d-flex">

                                <input type="text" class="input-field" name="chatbox" id="chatbox"
                                    placeholder="type here ... ">
                                <button id="SendBtn" class="glow-on-hover" hidden><i class="bi bi-send"></i></button>
                                <button id="MicBtn" class="glow-on-hover"><i class="bi bi-mic"></i></button>
                                <button id="ChatBtn" class="glow-on-hover" data-bs-toggle="offcanvas" data-bs-target="#offcanvasScrolling" aria-controls="offcanvasScrolling"><i class="bi bi-chat-dots"></i></button>
                                <button id="RecordBtn" class="glow-on-hover"><i class="bi bi-record-circle text-danger"></i></button>
                                <button id="SettingsBtn" class="glow-on-hover" data-bs-toggle="offcanvas" data-bs-target="#settingsPanel" aria-controls="settingsPanel"><i class="bi bi-gear"></i></button>

                            </div>
                        </div>
                    </div>

                </div>
                <div class="col-md-1"></div>
            </div>

        </section>

        <section id="SiriWave" class="mb-4" hidden>

            <div class="container">
                <div class="row">
                    <div class="col-md-12">
                        <div class="d-flex justify-content-center align-items-center" style="height: 70vh;">
                            <div class="">
                                <p class="text-start text-light mb-4 siri-message" style="font-size: 28px;">Hello, I am INTELLI</p>
                                <div id="siri-container"></div>
                            </div>

                        </div>

                        <!-- Text input always visible during voice mode -->
                        <div class="col-md-12 mt-2 pt-2">
                            <div class="text-center">
                                <div id="TextInputSiri" class="d-flex">
                                    <input type="text" class="input-field" name="chatbox-siri" id="chatbox-siri"
                                        placeholder="type here ... ">
                                    <button id="SendBtnSiri" class="glow-on-hover" hidden><i class="bi bi-send"></i></button>
                                    <button id="MicBtnSiri" class="glow-on-hover"><i class="bi bi-mic"></i></button>
                                    <button id="BackBtn" class="glow-on-hover" title="Back to home"><i class="bi bi-house"></i></button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </section>
    </div>

    <!-- Chat offcanvas -->
    <div class="offcanvas offcanvas-start chat-canvas" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1"
        id="offcanvasScrolling" aria-labelledby="offcanvasScrollingLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title text-white" id="offcanvasScrollingLabel">Chats</h5>
            <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div id="chat-canvas-body" class="offcanvas-body">
            <!-- Chatting code here -->

        </div>
    </div>

    <!-- Settings offcanvas -->
    <div class="offcanvas offcanvas-end settings-canvas" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1"
        id="settingsPanel" aria-labelledby="settingsPanelLabel">
        <div class="offcanvas-header settings-header">
            <h5 class="offcanvas-title text-white" id="settingsPanelLabel"><i class="bi bi-gear me-2"></i>Settings</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body settings-body">

            <!-- Voice Settings -->
            <div class="settings-group">
                <h6 class="settings-group-title"><i class="bi bi-mic me-2"></i>Voice</h6>
                <div class="settings-item">
                    <label class="settings-label" for="voiceSpeed">Speech Speed</label>
                    <select id="voiceSpeed" class="settings-select">
                        <option value="+0%">Normal</option>
                        <option value="+10%">Slightly Fast</option>
                        <option value="+15%" selected>Fast (Default)</option>
                        <option value="+25%">Very Fast</option>
                        <option value="-10%">Slow</option>
                    </select>
                </div>
                <div class="settings-item">
                    <label class="settings-label" for="voiceName">Voice Style</label>
                    <select id="voiceName" class="settings-select">
                        <option value="en-US-AriaNeural" selected>Aria (Female, US)</option>
                        <option value="en-US-JennyNeural">Jenny (Female, US)</option>
                        <option value="en-GB-SoniaNeural">Sonia (Female, UK)</option>
                        <option value="en-IN-NeerjaNeural">Neerja (Female, Indian)</option>
                        <option value="en-US-GuyNeural">Guy (Male, US)</option>
                    </select>
                </div>
                <div class="settings-item">
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="settings-label mb-0">Startup Sound</label>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="startupSound" checked>
                        </div>
                    </div>
                </div>
            </div>

            <!-- AI Brain Settings -->
            <div class="settings-group">
                <h6 class="settings-group-title"><i class="bi bi-cpu me-2"></i>AI Brain</h6>
                <div class="settings-item">
                    <label class="settings-label" for="aiModel">AI Model</label>
                    <select id="aiModel" class="settings-select">
                        <option value="cloud" selected>Cloud (Gemini)</option>
                        <option value="local">Local (Ollama)</option>
                    </select>
                </div>
                <div class="settings-item">
                    <label class="settings-label">Gemini API Key</label>
                    <input type="password" class="settings-input" id="geminiKeyDisplay" placeholder="••••••••" disabled>
                    <small class="text-muted d-block mt-1">Edit in .env file</small>
                </div>
            </div>

            <!-- Display Settings -->
            <div class="settings-group">
                <h6 class="settings-group-title"><i class="bi bi-palette me-2"></i>Display</h6>
                <div class="settings-item">
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="settings-label mb-0">Permission Prompts</label>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="permissionPrompts" checked>
                        </div>
                    </div>
                    <small class="text-muted">Ask before shutdown, screenshot, etc.</small>
                </div>
            </div>

            <!-- About -->
            <div class="settings-group">
                <h6 class="settings-group-title"><i class="bi bi-info-circle me-2"></i>About</h6>
                <div class="settings-item">
                    <p class="text-muted mb-1" style="font-size: 13px;">INTELLI AI Companion v2.0</p>
                    <p class="text-muted mb-1" style="font-size: 13px;">Created by a team of 5 engineering students</p>
                    <p class="text-muted mb-0" style="font-size: 13px;">Powered by Gemini + Edge-TTS</p>
                </div>
            </div>

            <!-- Save Button -->
            <div class="text-center mt-3 mb-4">
                <button id="saveSettingsBtn" class="btn btn-sm btn-outline-info px-4">Save Settings</button>
            </div>

        </div>
    </div>

    <!--Jquery  -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <!-- Particle js -->
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>
    <script src='https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.2/jquery-ui.min.js'></script>
    <script src="script.js"></script>

    <!-- Siri wave -->
    <script src="https://unpkg.com/siriwave/dist/siriwave.umd.min.js"></script>

    <!-- Texllate js -->
    <script src="assets/vendore/texllate/jquery.fittext.js"></script>
    <script src="assets/vendore/texllate/jquery.lettering.js"></script>
    <script src="http://jschr.github.io/textillate/jquery.textillate.js"></script>

    <script src="main.js"></script>
    <script src="controller.js"></script>
    <script src="/eel.js"></script>


</body>

</html>
